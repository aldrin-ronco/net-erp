  "List of organizations"
  entries: [Organization!]!

  "Total number of organizations"
  totalEntries: Int!

  "Current page number"
  pageNumber: Int!

  "Number of entries per page"
  pageSize: Int!

  "Total number of pages"
  totalPages: Int!
}

"Organization filter input"
input OrganizationFilters {
  "Filter by owning account ID"
  accountId: ID

  "Filter by assigned server ID"
  serverId: ID

  "Filter by organization name (case insensitive partial match)"
  name: String

  "Filter by organization status"
  status: OrganizationStatus

  "Search across name fields (case insensitive partial match)"
  matching: String
}

"Organization input for create operations"
input CreateOrganizationInput {
  "Owning account ID"
  accountId: ID!

  "Assigned server ID"
  serverId: ID!

  "Organization name"
  name: String!

  "Database name (optional, auto-generated from name if not provided)"
  databaseName: String

  "Organization status (defaults to active)"
  status: OrganizationStatus

  "Whether to use connection pool (default: false)"
  useConnectionPool: Boolean
}

"Organization input for update operations"
input UpdateOrganizationInput {
  "Owning account ID"
  accountId: ID

  "Organization name"
  name: String

  "Database name (optional, auto-generated from name if not provided)"
  databaseName: String

  "Organization status"
  status: OrganizationStatus

  "Whether to use connection pool"
  useConnectionPool: Boolean

  "Enable\/disable unprovision protection switch"
  unprovisionProtectionEnabled: Boolean
}

"Response payload for organization creation"
type CreateOrganizationPayload {
  "The created organization"
  organization: Organization

  "Whether the operation was successful"
  success: Boolean!

  "Human-readable message"
  message: String

  "List of validation errors"
  errors: [FieldError!]
}

"Response payload for organization updates"
type UpdateOrganizationPayload {
  "The updated organization"
  organization: Organization

  "Whether the operation was successful"
  success: Boolean!

  "Human-readable message"
  message: String

  "List of validation errors"
  errors: [FieldError!]
}

"Response payload for organization deletion"
type DeleteOrganizationPayload {
  "Whether the deletion was successful"
  success: Boolean!

  "Human-readable message"
  message: String

  "ID of the deleted organization (when successful)"
  deletedId: ID

  "List of validation errors"
  errors: [FieldError!]
}

"Input for triggering organization DB provisioning"
input ProvisionOrganizationDatabaseInput {
  "Organization ID"
  id: ID!
}

"Response for organization DB provisioning"
type ProvisionOrganizationDatabasePayload {
  "The organization after provisioning state update"
  organization: Organization

  "Whether the provisioning succeeded"
  success: Boolean!

  "Human-readable message"
  message: String

  "List of validation errors"
  errors: [FieldError!]
}

"Input for triggering organization DB unprovisioning (drop DB)"
input UnprovisionOrganizationDatabaseInput {
  "Organization ID"
  id: ID!
}

"Response for organization DB unprovisioning"
type UnprovisionOrganizationDatabasePayload {
  "The organization after unprovision state update"
  organization: Organization

  "Whether the unprovisioning succeeded"
  success: Boolean!

  "Human-readable message"
  message: String

  "List of validation errors"
  errors: [FieldError!]
}

"Fields available for sorting organizations"
enum OrganizationSortField {
  "Sort by organization name"
  NAME

  "Sort by organization status"
  STATUS

  "Sort by creation date"
  INSERTED_AT

  "Sort by last update date"
  UPDATED_AT
}

"Sort configuration for organizations"
input OrganizationSortInput {
  "Field to sort by"
  field: OrganizationSortField!

  "Sort direction (defaults to ASC)"
  direction: SortDirection
}

"API Key entity"
type ApiKey {
  "Unique identifier"
  id: ID!

  "Name of the API key"
  name: String!

  "Whether the API key is active"
  active: Boolean!

  "Audience this API key targets (ERP or CPANEL)"
  audience: ApiKeyAudience!

  "When the API key expires"
  expiresAt: IsoDatetime

  "When the API key was last used"
  lastUsedAt: IsoDatetime

  "Number of times the API key has been used"
  usageCount: Int!

  "When the API key was created"
  insertedAt: IsoDatetime!

  "When the API key was last updated"
  updatedAt: IsoDatetime!

  "Account that owns this API key"
  owner: Account
}

"API Key audience"
enum ApiKeyAudience {
  "Key intended for ERP operations"
  ERP

  "Key intended for CPanel operations"
  CPANEL
}

"Input for creating a new API key"
input CreateApiKeyInput {
  "Name of the API key"
  name: String!

  "Whether the API key should be active (default: true)"
  active: Boolean

  "Owner account ID for this API key"
  ownerId: ID

  "Audience for the API key (defaults to ERP)"
  audience: ApiKeyAudience

  "Optional expiration date"
  expiresAt: IsoDatetime
}

"Input for updating an API key"
input UpdateApiKeyInput {
  "Name of the API key"
  name: String

  "Whether the API key should be active"
  active: Boolean

  "Owner account ID for this API key"
  ownerId: ID

  "Audience for the API key"
  audience: ApiKeyAudience

  "Optional expiration date"
  expiresAt: IsoDatetime
}

"Response payload for API key creation"
type CreateApiKeyPayload {
  "The created API key"
  apiKey: ApiKey

  "Whether the operation was successful"
  success: Boolean!

  "Success\/error message"
  message: String

  "The generated API key value (only returned on creation)"
  key: String

  "List of validation errors"
  errors: [FieldError!]!
}

"Response payload for API key updates"
type UpdateApiKeyPayload {
  "The updated API key"
  apiKey: ApiKey

  "Whether the operation was successful"
  success: Boolean!

  "Success\/error message"
  message: String

  "List of validation errors"
  errors: [FieldError!]!
}

"Response payload for API key deletion"
type DeleteApiKeyPayload {
  "Whether the operation was successful"
  success: Boolean!

  "Success\/error message"
  message: String

  "ID of the deleted API key (when successful)"
  deletedId: ID

  "List of validation errors"
  errors: [FieldError!]!
}

"API Key filters for queries"
input ApiKeyFilters {
  "Filter by name (partial match)"
  name: String

  "Filter by active status"
  active: Boolean

  "Filter by audience (ERP or CPANEL)"
  audience: ApiKeyAudience

  "Filter by owner account ID"
  ownerId: ID

  "Filter by matching name (partial match)"
  matching: String

  "Alias of matching: searches by name"
  search: String
}

"Fields available for sorting API keys"
enum ApiKeySortField {
  "Sort by API key name"
  NAME

  "Sort by active status"
  ACTIVE

  "Sort by usage count"
  USAGE_COUNT

  "Sort by last used date"
  LAST_USED_AT

  "Sort by creation date"
  INSERTED_AT

  "Sort by last update date"
  UPDATED_AT
}

"Sort configuration for API keys"
input ApiKeySortInput {
  "Field to sort by"
  field: ApiKeySortField!

  "Sort direction (defaults to ASC)"
  direction: SortDirection
