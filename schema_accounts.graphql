schema {
  mutation: RootMutationType
  subscription: RootSubscriptionType
  query: RootQueryType
}

type RootQueryType {
  "Get paginated list of servers with sorting"
  serversPage(pagination: Pagination, filters: ServerFilters, sort: [ServerSortInput]): ServerPage

  "Get a single server by ID"
  server(
    "Server ID"
    id: ID!
  ): Server

  "Get encrypted server configuration bundle (iv||ciphertext||tag base64) by company reference"
  serverConfigEncryptedByCompanyReference(
    "Company reference"
    reference: String!
  ): String

  "Get all API keys with pagination, filters, and sorting"
  apiKeysPage(
    "Pagination parameters"
    pagination: Pagination

    "Filter parameters"
    filters: ApiKeyFilters

    "Sort parameters"
    sort: [ApiKeySortInput]
  ): ApiKeyPage

  "Get a single API key by ID"
  apiKey(
    "API key ID"
    id: ID!
  ): ApiKey

  "Get paginated list of organizations with optional filters and sorting"
  organizationsPage(
    "Pagination parameters"
    pagination: Pagination

    "Filter parameters"
    filters: OrganizationFilters

    "Sort parameters"
    sort: [OrganizationSortInput]
  ): OrganizationPage

  "Get a single organization by ID"
  organization(
    "Organization ID"
    id: ID!
  ): Organization

  "Get a paginated list of accounts with optional filters and sorting"
  accountsPage(
    "Pagination parameters"
    pagination: Pagination

    "Filter options for accounts"
    filters: AccountFilters

    "Sort options for accounts"
    sort: [AccountSortInput]
  ): AccountPage

  "Get a specific account by ID"
  account(
    "Account ID"
    id: ID!
  ): Account

  "Get a paginated list of companies with optional filters and sorting"
  companiesPage(
    "Pagination parameters"
    pagination: Pagination

    "Filter options for companies"
    filters: CompanyFilters

    "Sort options for companies"
    sort: [CompanySortInput]
  ): CompanyPage

  "Get a specific company by ID"
  company(
    "Company ID"
    id: ID!
  ): Company

  "Get a specific company by reference"
  companyByReference(
    "Company reference"
    reference: String!
  ): Company

  "Get paginated list of collaborators"
  collaboratorsPage(
    "Pagination parameters"
    pagination: Pagination

    "Filters for collaborators"
    filters: CollaboratorFilters

    "Sorting parameters"
    sort: [CollaboratorSortInput!]
  ): CollaboratorPage

  "Get a single collaborator by composite key"
  collaborator(
    "Composite key input: account_id + company_id"
    input: GetCollaboratorInput!
  ): Collaborator

  "Get a paginated list of countries with optional filters and sorting"
  countriesPage(pagination: Pagination, filters: CountryFilters, sort: [CountrySortInput]): CountryPage

  "Get a specific country by ID"
  country(id: ID!): Country

  "Get a paginated list of departments with optional filters and sorting"
  departmentsPage(pagination: Pagination, filters: DepartmentFilters, sort: [DepartmentSortInput]): DepartmentPage

  "Get a specific department by ID"
  department(id: ID!): Department

  "Get a paginated list of cities with optional filters and sorting"
  citiesPage(pagination: Pagination, filters: CityFilters, sort: [CitySortInput]): CityPage

  "Get a specific city by ID"
  city(id: ID!): City

  "Get a paginated list of identification types with optional filters and sorting"
  identificationTypesPage(
    pagination: Pagination, filters: IdentificationTypeFilters, sort: [IdentificationTypeSortInput]
  ): IdentificationTypePage

  "Get a specific identification type by ID"
  identificationType(id: ID!): IdentificationType

  currenciesPage(pagination: Pagination, filters: CurrencyFilters, sort: [CurrencySortInput]): CurrencyPage

  currency(id: ID!): Currency

  "Get a paginated list of business types with optional filters and sorting"
  businessTypesPage(pagination: Pagination, filters: BusinessTypeFilters, sort: [BusinessTypeSortInput]): BusinessTypePage

  "Get a specific business type by ID"
  businessType(id: ID!): BusinessType

  menuModulesPage(pagination: Pagination, filters: MenuModuleFilters, sort: [MenuModuleSortInput]): MenuModulePage

  menuModule(id: ID!): MenuModule

  "Get a paginated list of menu items with optional filters and sorting"
  menuItemsPage(pagination: Pagination, filters: MenuItemFilters, sort: [MenuItemSortInput]): MenuItemPage

  "Get a specific menu item by ID"
  menuItem(id: ID!): MenuItem

  menuItemGroupsPage(pagination: Pagination, filters: MenuItemGroupFilters, sort: [MenuItemGroupSortInput]): MenuItemGroupPage

  menuItemGroup(id: ID!): MenuItemGroup

  "Get a paginated list of business type modules with optional filters and sorting"
  businessTypeModulesPage(
    pagination: Pagination, filters: BusinessTypeModuleFilters, sort: [BusinessTypeModuleSortInput]
  ): BusinessTypeModulePage

  "Get a specific business type module by ID"
  businessTypeModule(id: ID!): BusinessTypeModule
}

type RootSubscriptionType {
  "Subscribe to provisioning logs for a given organization ID or 'all'"
  provisionLog(orgId: ID!): ProvisionLogEvent

  "Subscribe to all company seeds events (file results + pipeline) by API company ID"
  companySeedFileResult(companyId: ID!): CompanySeedFileEvent
}

type RootMutationType {
  "Create a new server"
  createServer(
    "Server data"
    input: CreateServerInput!
  ): CreateServerPayload

  "Update an existing server"
  updateServer(
    "Server ID"
    id: ID!

    "Server data to update"
    input: UpdateServerInput!
  ): UpdateServerPayload

  "Delete a server"
  deleteServer(
    "Server ID"
    id: ID!
  ): DeleteServerPayload

  "Create a new API key"
  createApiKey(
    "API key creation parameters"
    input: CreateApiKeyInput!
  ): CreateApiKeyPayload

  "Update an existing API key"
  updateApiKey(
    "API key ID"
    id: ID!

    "API key update parameters"
    input: UpdateApiKeyInput!
  ): UpdateApiKeyPayload

  "Delete an API key"
  deleteApiKey(
    "API key ID"
    id: ID!
  ): DeleteApiKeyPayload

  "Create a new organization"
  createOrganization(
    "Organization creation data"
    input: CreateOrganizationInput!
  ): CreateOrganizationPayload

  "Update an existing organization"
  updateOrganization(
    "Organization ID"
    id: ID!

    "Organization update data"
    input: UpdateOrganizationInput!
  ): UpdateOrganizationPayload

  "Delete an organization"
  deleteOrganization(
    "Organization ID"
    id: ID!
  ): DeleteOrganizationPayload

  "Provision the organization's database (create DB, apply schema and seeds on first run)"
  provisionOrganizationDatabase(
    "Provisioning trigger input"
    input: ProvisionOrganizationDatabaseInput!
  ): ProvisionOrganizationDatabasePayload

  "Unprovision the organization's database (terminate connections, drop DB, reset status)"
  unprovisionOrganizationDatabase(
    "Unprovision trigger input"
    input: UnprovisionOrganizationDatabaseInput!
  ): UnprovisionOrganizationDatabasePayload

  "Create a new account"
  createAccount(
    "Account data for creation"
    input: CreateAccountInput!
  ): CreateAccountPayload

  "Update an existing account (email cannot be changed)"
  updateAccount(
    "Account ID"
    id: ID!

    "Account data for update"
    input: UpdateAccountInput!
  ): UpdateAccountPayload

  "Delete an account"
  deleteAccount(
    "Account ID"
    id: ID!
  ): DeleteAccountPayload

  "Login with email and password"
  loginAccount(
    "Login credentials"
    input: LoginAccountInput!
  ): LoginAccountPayload

  "Validate access ticket (internal ERP API use)"
  validateTicket(
    "Ticket validation input"
    input: ValidateTicketInput!
  ): ValidateTicketPayload

  "Validate ERP session id from X-Session-ID header"
  validateSession(
    "Optional input for session validation (falls back to X-Session-ID header)"
    input: ValidateSessionInput
  ): ValidateSessionPayload

  "Create a new company"
  createCompany(
    "Company creation input"
    input: CreateCompanyInput!
  ): CreateCompanyPayload

  "Update an existing company"
  updateCompany(
    "Company ID"
    id: ID!

    "Company update input"
    input: UpdateCompanyInput!
  ): UpdateCompanyPayload

  "Delete a company"
  deleteCompany(
    "Company ID"
    id: ID!
  ): DeleteCompanyPayload

  "Run company-specific seeds (post-provision). Executes NNN_*.sql files under priv\/sql\/company_seeds\/."
  runCompanySeeds(
    "Company ID (API)"
    companyId: ID!
  ): RunCompanySeedsPayload

  "Create a new collaborator"
  createCollaborator(
    "Collaborator creation input"
    input: CreateCollaboratorInput!
  ): CreateCollaboratorPayload

  "Delete a collaborator"
  deleteCollaborator(
    "Composite key input: account_id + company_id"
    input: DeleteCollaboratorInput!
  ): DeleteCollaboratorPayload

  "Delete all collaborators of a company"
  deleteCollaboratorsByCompany(
    "Company ID whose collaborators will be deleted"
    companyId: Int!
  ): DeleteCollaboratorsByCompanyPayload

  "Create a new country"
  createCountry(input: CreateCountryInput!): CreateCountryPayload

  "Update an existing country"
  updateCountry(id: ID!, input: UpdateCountryInput!): UpdateCountryPayload

  "Delete a country"
  deleteCountry(id: ID!): DeleteCountryPayload

  "Create a new department"
  createDepartment(input: CreateDepartmentInput!): CreateDepartmentPayload

  "Update an existing department"
  updateDepartment(id: ID!, input: UpdateDepartmentInput!): UpdateDepartmentPayload

  "Delete a department"
  deleteDepartment(id: ID!): DeleteDepartmentPayload

  "Create a new city"
  createCity(input: CreateCityInput!): CreateCityPayload

  "Update an existing city"
  updateCity(id: ID!, input: UpdateCityInput!): UpdateCityPayload

  "Delete a city"
  deleteCity(id: ID!): DeleteCityPayload

  "Create a new identification type"
  createIdentificationType(input: CreateIdentificationTypeInput!): CreateIdentificationTypePayload

  "Update an existing identification type"
  updateIdentificationType(id: ID!, input: UpdateIdentificationTypeInput!): UpdateIdentificationTypePayload

  "Delete an identification type"
  deleteIdentificationType(id: ID!): DeleteIdentificationTypePayload

  createCurrency(input: CreateCurrencyInput!): CreateCurrencyPayload

  updateCurrency(id: ID!, input: UpdateCurrencyInput!): UpdateCurrencyPayload

  deleteCurrency(id: ID!): DeleteCurrencyPayload

  "Create a new business type"
  createBusinessType(input: CreateBusinessTypeInput!): CreateBusinessTypePayload

  "Update an existing business type"
  updateBusinessType(id: ID!, input: UpdateBusinessTypeInput!): UpdateBusinessTypePayload

  "Delete a business type"
  deleteBusinessType(id: ID!): DeleteBusinessTypePayload

  createMenuModule(input: CreateMenuModuleInput!): CreateMenuModulePayload

  updateMenuModule(id: ID!, input: UpdateMenuModuleInput!): UpdateMenuModulePayload

  deleteMenuModule(id: ID!): DeleteMenuModulePayload

  "Create a new menu item"
  createMenuItem(input: CreateMenuItemInput!): CreateMenuItemPayload

  "Update an existing menu item"
  updateMenuItem(id: ID!, input: UpdateMenuItemInput!): UpdateMenuItemPayload

  "Delete a menu item"
  deleteMenuItem(id: ID!): DeleteMenuItemPayload

  "Bulk create menu items for a menu item group"
  bulkCreateMenuItems(input: BulkCreateMenuItemsInput!): BulkCreateMenuItemsPayload

  "Bulk update display_order for multiple menu items"
  bulkUpdateMenuItemOrder(inputs: [BulkUpdateMenuItemOrderInput!]!): BulkUpdateMenuItemOrderPayload

  createMenuItemGroup(input: CreateMenuItemGroupInput!): CreateMenuItemGroupPayload

  updateMenuItemGroup(id: ID!, input: UpdateMenuItemGroupInput!): UpdateMenuItemGroupPayload

  deleteMenuItemGroup(id: ID!): DeleteMenuItemGroupPayload

  bulkUpdateMenuItemGroupOrder(inputs: [BulkUpdateMenuItemGroupOrderInput!]!): BulkUpdateMenuItemGroupOrderPayload

  "Create a new business type module association"
  createBusinessTypeModule(input: CreateBusinessTypeModuleInput!): CreateBusinessTypeModulePayload

  "Update an existing business type module"
  updateBusinessTypeModule(id: ID!, input: UpdateBusinessTypeModuleInput!): UpdateBusinessTypeModulePayload

  "Delete a business type module"
  deleteBusinessTypeModule(id: ID!): DeleteBusinessTypeModulePayload
}

"Pagination input"
input Pagination {
  "Page number (default: 1)"
  page: Int

  "Items per page (default: 10)"
  pageSize: Int
}

